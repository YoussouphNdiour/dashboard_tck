# Blueprint Render - Site statique pour le dashboard TCK
# Doc: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: dashboard_tck
    runtime: static
    buildCommand: pip install -r requirements.txt && python report_plotly.py --input data/processed.csv --output_html build/index.html
    staticPublishPath: build
    branch: main
